<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahh Arcade 🎮</title>
  <meta name="description" content="A retro mini-game arcade featuring Flappy Fahh, Pong and Memory Match." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="arcade.css" />

  <style>
    /* ── Flappy Fahh in-game HUD (shown inside the game overlay) ── */
    #flappy-hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
    }
    #flappy-hud.active { display: block; }
    /* Canvas and the game overlay inside need to catch pointer events */
    #gameCanvas       { pointer-events: auto; }
    #gameOverlay      { pointer-events: auto; }

    #gravityIndicator {
      position: absolute;
      top: 12px; right: 14px;
      font-size: 0.72rem; font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(0,0,0,0.55);
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: color 0.3s, border-color 0.3s;
      letter-spacing: 1px;
    }
    #gravityIndicator.normal   { color: #4ecca3; border-color: rgba(78,204,163,0.5); }
    #gravityIndicator.inverted { color: #ff6b6b; border-color: rgba(255,107,107,0.5); }

    #scoreEl {
      position: absolute;
      top: 12px; left: 14px;
      font-size: 1.05rem; font-weight: 700;
      color: #f9ca24;
      text-shadow: 0 0 12px rgba(249,202,36,0.6);
    }

    /* Flappy overlay (start / dead) */
    #gameOverlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      opacity: 1;
      transition: opacity 0.35s ease;
    }
    #gameOverlay.hidden { opacity: 0; pointer-events: none; }

    #overlayTitle {
      font-size: 2.4rem; font-weight: 900; line-height: 1;
    }
    #overlayTitle.dead  { color: #ff6b6b; animation: shake 0.4s ease; }
    #overlayTitle.start {
      background: linear-gradient(135deg, #f9ca24, #f0932b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #overlayScore { font-size: 1.1rem; color: #ccc; font-weight: 400; }
    #overlayBest  { font-size: 0.85rem; color: #8899bb; }
    #overlayHint  {
      margin-top: 6px; font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      animation: pulse 1.8s ease-in-out infinite;
    }
    #flappyControls {
      font-size: 0.78rem; color: #8899bb;
      text-align: center; line-height: 2;
      position: absolute;
      top: 100%; left: 50%; transform: translateX(-50%);
      white-space: nowrap;
      margin-top: 10px;
    }
    #flappyControls kbd {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px; padding: 1px 8px;
      color: #f9ca24; font-weight: 700;
      font-size: 0.78rem;
    }

    /* Canvas wrappers */
    .canvas-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.1),
        0 0 40px rgba(255,255,255,0.05),
        0 40px 80px rgba(0,0,0,0.6);
    }

    .canvas-wrapper.flappy-wrapper {
      box-shadow:
        0 0 0 2px rgba(249,202,36,0.3),
        0 0 40px rgba(249,202,36,0.2),
        0 40px 80px rgba(0,0,0,0.6);
    }
    .canvas-wrapper.pong-wrapper {
      box-shadow:
        0 0 0 2px rgba(78,204,163,0.3),
        0 0 40px rgba(78,204,163,0.2),
        0 40px 80px rgba(0,0,0,0.6);
    }
    .canvas-wrapper.memory-wrapper {
      box-shadow:
        0 0 0 2px rgba(162,155,254,0.3),
        0 0 40px rgba(162,155,254,0.2),
        0 40px 80px rgba(0,0,0,0.6);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.45; }
      50%      { opacity: 1; }
    }

    /* Game title badge inside overlay */
    .game-title-badge {
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      padding: 6px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      letter-spacing: 2px;
      z-index: 10;
    }
    .game-title-badge.flappy { color: #f9ca24; }
    .game-title-badge.pong   { color: #4ecca3; }
    .game-title-badge.memory { color: #a29bfe; }

    /* Responsive canvas sizing */
    canvas { display: block; }
  </style>
</head>
<body>

<!-- Starfield background -->
<div class="starfield" id="starfield"></div>

<!-- CRT scanlines -->
<div class="crt-lines"></div>

<!-- ── HUB ─────────────────────────────────────────────────── -->
<div id="hub">
  <header class="hub-header">
    <div class="hub-logo">🎮 FAHH ARCADE</div>
    <div class="hub-subtitle">Choose your game</div>
  </header>

  <div class="games-grid">
