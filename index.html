<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahh Arcade 🎮</title>
  <meta name="description" content="A retro mini-game arcade featuring Flappy Fahh, Pong and Memory Match." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="arcade.css" />

  <style>
    /* ── Flappy Fahh in-game HUD (shown inside the game overlay) ── */
    #flappy-hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
    }
    #flappy-hud.active { display: block; }
    /* Canvas and the game overlay inside need to catch pointer events */
    #gameCanvas       { pointer-events: auto; }
    #gameOverlay      { pointer-events: auto; }

    #gravityIndicator {
      position: absolute;
      top: 12px; right: 14px;
      font-size: 0.72rem; font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(0,0,0,0.55);
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: color 0.3s, border-color 0.3s;
      letter-spacing: 1px;
    }
    #gravityIndicator.normal   { color: #4ecca3; border-color: rgba(78,204,163,0.5); }
    #gravityIndicator.inverted { color: #ff6b6b; border-color: rgba(255,107,107,0.5); }

    #scoreEl {
      position: absolute;
      top: 12px; left: 14px;
      font-size: 1.05rem; font-weight: 700;
